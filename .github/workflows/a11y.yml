name: Accessibility Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Serve and audit
        run: |
          npx serve dist -l 4321 &
          sleep 3

          PAGES=(
            "/"
            "/about"
            "/church"
            "/connect"
            "/campuses"
            "/campuses/sjsu-klesis"
            "/campuses/sjsu-4c"
            "/campuses/scu-klesis"
            "/campuses/stanford-moment"
            "/campuses/ucsc-klesis"
          )

          node -e "
          const { chromium } = require('playwright');
          const AxeBuilder = require('@axe-core/playwright').default;

          (async () => {
            const browser = await chromium.launch();
            const pages = process.argv.slice(1);
            let failed = false;

            for (const path of pages) {
              const context = await browser.newContext();
              const page = await context.newPage();
              await page.goto('http://localhost:4321' + path, { waitUntil: 'load' });

              const results = await new AxeBuilder({ page }).analyze();

              if (results.violations.length > 0) {
                failed = true;
                console.log('\n❌ ' + path);
                for (const v of results.violations) {
                  console.log('  [' + v.impact + '] ' + v.id + ': ' + v.description + ' (' + v.nodes.length + ' elements)');
                }
              } else {
                console.log('✅ ' + path);
              }
              await context.close();
            }

            await browser.close();
            process.exit(failed ? 1 : 0);
          })();
          " "${PAGES[@]}"

name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        continue-on-error: true # advisory until pre-existing errors in about.astro and church.astro are fixed
        run: npx astro check

      - name: Build
        run: npm run build
